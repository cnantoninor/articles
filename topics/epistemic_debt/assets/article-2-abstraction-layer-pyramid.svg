<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="l4grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="l3grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="l2grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="l1grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Gap fill -->
    <pattern id="gapHatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.3"/>
    </pattern>
    <!-- Danger gradient for cost bar -->
    <linearGradient id="dangerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="35%" stop-color="#f97316"/>
      <stop offset="70%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Epistemic Debt Across Abstraction Layers</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748b">Ed = Σ_k ∫ (Cs_k(t) − Gc_k(t)) dt — where debt lives determines what it costs</text>

  <!-- Column headers -->
  <g transform="translate(0, 80)">
    <text x="105" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">LAYER</text>
    <text x="340" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">COMPLEXITY vs UNDERSTANDING</text>
    <text x="600" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">CASCADE COST (c_k)</text>
    <text x="795" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">RECOVERY</text>
    <line x1="30" y1="10" x2="870" y2="10" stroke="#d1d5db" stroke-width="1"/>
  </g>

  <!-- ============ L4: Requirements ============ -->
  <g transform="translate(0, 110)">
    <!-- Layer badge -->
    <rect x="30" y="0" width="150" height="80" rx="6" fill="url(#l4grad)"/>
    <text x="105" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="white">L4</text>
    <text x="105" y="46" text-anchor="middle" font-size="11" font-weight="600" fill="white">Requirements</text>
    <text x="105" y="62" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Intent &amp; business need</text>

    <!-- Complexity bar (Cs) -->
    <rect x="200" y="12" width="250" height="22" rx="4" fill="#e2e8f0"/>
    <rect x="200" y="12" width="230" height="22" rx="4" fill="#7c3aed" opacity="0.7"/>
    <text x="210" y="27" font-size="9" font-weight="600" fill="white">Cs₄ — System Complexity</text>

    <!-- Understanding bar (Gc) -->
    <rect x="200" y="44" width="250" height="22" rx="4" fill="#e2e8f0"/>
    <rect x="200" y="44" width="90" height="22" rx="4" fill="#059669" opacity="0.8"/>
    <text x="210" y="59" font-size="9" font-weight="600" fill="white">Gc₄</text>

    <!-- Gap indicator -->
    <rect x="290" y="44" width="140" height="22" rx="0" fill="url(#gapHatch)"/>
    <text x="360" y="59" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">← GAP</text>

    <!-- Cascade cost -->
    <rect x="480" y="8" width="240" height="64" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="600" y="32" text-anchor="middle" font-size="28" font-weight="800" fill="#991b1b">30–70×</text>
    <text x="600" y="52" text-anchor="middle" font-size="10" fill="#991b1b">Everything below must be re-recovered</text>

    <!-- Recovery description -->
    <text x="740" y="35" font-size="10" fill="#374151">Hours of</text>
    <text x="740" y="50" font-size="10" fill="#374151">reverse-</text>
    <text x="740" y="65" font-size="10" fill="#374151">engineering</text>
  </g>

  <!-- ============ L3: Architecture ============ -->
  <g transform="translate(0, 210)">
    <rect x="30" y="0" width="150" height="80" rx="6" fill="url(#l3grad)"/>
    <text x="105" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="white">L3</text>
    <text x="105" y="46" text-anchor="middle" font-size="11" font-weight="600" fill="white">Architecture</text>
    <text x="105" y="62" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Structure &amp; boundaries</text>

    <rect x="200" y="12" width="250" height="22" rx="4" fill="#e2e8f0"/>
    <rect x="200" y="12" width="200" height="22" rx="4" fill="#2563eb" opacity="0.7"/>
    <text x="210" y="27" font-size="9" font-weight="600" fill="white">Cs₃ — System Complexity</text>

    <rect x="200" y="44" width="250" height="22" rx="4" fill="#e2e8f0"/>
    <rect x="200" y="44" width="120" height="22" rx="4" fill="#059669" opacity="0.8"/>
    <text x="210" y="59" font-size="9" font-weight="600" fill="white">Gc₃</text>

    <rect x="320" y="44" width="80" height="22" rx="0" fill="url(#gapHatch)"/>
    <text x="360" y="59" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">← GAP</text>

    <rect x="480" y="8" width="240" height="64" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
    <text x="600" y="32" text-anchor="middle" font-size="28" font-weight="800" fill="#c2410c">~10×</text>
    <text x="600" y="52" text-anchor="middle" font-size="10" fill="#c2410c">Cascade into L2 and L1</text>

    <text x="740" y="35" font-size="10" fill="#374151">Significant</text>
    <text x="740" y="50" font-size="10" fill="#374151">rework</text>
  </g>

  <!-- ============ L2: Design ============ -->
  <g transform="translate(0, 310)">
    <rect x="30" y="0" width="150" height="80" rx="6" fill="url(#l2grad)"/>
    <text x="105" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="white">L2</text>
    <text x="105" y="46" text-anchor="middle" font-size="11" font-weight="600" fill="white">Design</text>
    <text x="105" y="62" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Patterns &amp; contracts</text>

    <rect x="200" y="12" width="250" height="22" rx="4" fill="#e2e8f0"/>
    <rect x="200" y="12" width="180" height="22" rx="4" fill="#0891b2" opacity="0.7"/>
    <text x="210" y="27" font-size="9" font-weight="600" fill="white">Cs₂ — System Complexity</text>

    <rect x="200" y="44" width="250" height="22" rx="4" fill="#e2e8f0"/>
    <rect x="200" y="44" width="140" height="22" rx="4" fill="#059669" opacity="0.8"/>
    <text x="210" y="59" font-size="9" font-weight="600" fill="white">Gc₂</text>

    <rect x="340" y="44" width="40" height="22" rx="0" fill="url(#gapHatch)"/>
    <text x="360" y="59" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">GAP</text>

    <rect x="480" y="8" width="240" height="64" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="600" y="32" text-anchor="middle" font-size="28" font-weight="800" fill="#a16207">3–6×</text>
    <text x="600" y="52" text-anchor="middle" font-size="10" fill="#a16207">Ripples into L1</text>

    <text x="740" y="35" font-size="10" fill="#374151">Moderate</text>
    <text x="740" y="50" font-size="10" fill="#374151">rework</text>
  </g>

  <!-- ============ L1: Implementation ============ -->
  <g transform="translate(0, 410)">
    <rect x="30" y="0" width="150" height="80" rx="6" fill="url(#l1grad)"/>
    <text x="105" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="white">L1</text>
    <text x="105" y="46" text-anchor="middle" font-size="11" font-weight="600" fill="white">Implementation</text>
    <text x="105" y="62" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Code &amp; logic</text>

    <rect x="200" y="12" width="250" height="22" rx="4" fill="#e2e8f0"/>
    <rect x="200" y="12" width="160" height="22" rx="4" fill="#059669" opacity="0.7"/>
    <text x="210" y="27" font-size="9" font-weight="600" fill="white">Cs₁ — System Complexity</text>

    <rect x="200" y="44" width="250" height="22" rx="4" fill="#e2e8f0"/>
    <rect x="200" y="44" width="150" height="22" rx="4" fill="#059669" opacity="0.8"/>
    <text x="210" y="59" font-size="9" font-weight="600" fill="white">Gc₁</text>

    <rect x="350" y="44" width="10" height="22" rx="0" fill="url(#gapHatch)"/>

    <rect x="480" y="8" width="240" height="64" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="600" y="32" text-anchor="middle" font-size="28" font-weight="800" fill="#166534">~1×</text>
    <text x="600" y="52" text-anchor="middle" font-size="10" fill="#166534">Local fix, no cascade</text>

    <text x="740" y="35" font-size="10" fill="#374151">Minutes</text>
    <text x="740" y="50" font-size="10" fill="#374151">if L2–L4 clear</text>
  </g>

  <!-- Cascade arrow on the right -->
  <g transform="translate(855, 120)">
    <line x1="0" y1="0" x2="0" y2="360" stroke="#ef4444" stroke-width="2.5" stroke-opacity="0.6"/>
    <polygon points="0,360 -6,345 6,345" fill="#ef4444" opacity="0.6"/>
    <text x="10" y="180" font-size="10" fill="#ef4444" transform="rotate(90, 10, 180)" text-anchor="middle" font-weight="600">CASCADE DIRECTION ↓</text>
  </g>

  <!-- Bottom insight -->
  <g transform="translate(450, 520)">
    <rect x="-390" y="-14" width="780" height="42" rx="6" fill="#1e293b"/>
    <text x="0" y="6" text-anchor="middle" font-size="12" fill="white" font-weight="600">
      Key insight: Where debt lives matters more than how much code was generated.
    </text>
    <text x="0" y="22" text-anchor="middle" font-size="11" fill="#94a3b8">
      400 lines of L1 code from solid specs → cheap recovery | One L4 misalignment → cost dwarfs the time saved
    </text>
  </g>
</svg>