<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Epistemic debt area gradient -->
    <linearGradient id="debtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.08"/>
    </linearGradient>
    <!-- Pre-LLM friction zone -->
    <linearGradient id="frictionGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="40" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">The Growing Gap: How Epistemic Debt Accumulates</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#64748b">Ed = ∫ (Cs(t) − Gc(t)) dt — debt is the area between the curves</text>

  <!-- Chart area -->
  <g transform="translate(80, 75)">
    <!-- Grid -->
    <rect x="0" y="0" width="720" height="360" fill="url(#grid)"/>
    <rect x="0" y="0" width="720" height="360" fill="none" stroke="#d1d5db" stroke-width="1"/>

    <!-- Era divider -->
    <line x1="360" y1="0" x2="360" y2="360" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8,4"/>
    <text x="180" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">PRE-LLM ERA</text>
    <text x="540" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">POST-LLM ERA</text>

    <!-- Pre-LLM small gap area (friction zone) -->
    <path d="M 0,340 C 60,335 120,320 180,300 C 240,278 300,250 360,218
             L 360,238
             C 300,265 240,290 180,310 C 120,328 60,338 0,342 Z"
          fill="url(#frictionGrad)"/>

    <!-- Post-LLM epistemic debt area -->
    <path d="M 360,218 C 420,178 480,130 540,85 C 600,45 660,18 720,5
             L 720,148
             C 660,178 600,210 540,238 C 480,262 420,278 360,238 Z"
          fill="url(#debtGrad)"/>

    <!-- Cs(t) — System Complexity curve -->
    <!-- Pre-LLM: gradual rise -->
    <path d="M 0,340 C 60,335 120,320 180,300 C 240,278 300,250 360,218"
          fill="none" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Post-LLM: steep rise -->
    <path d="M 360,218 C 420,178 480,130 540,85 C 600,45 660,18 720,5"
          fill="none" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>

    <!-- Gc(t) — Cognitive Grasp curve -->
    <!-- Pre-LLM: tracks closely (friction keeps them together) -->
    <path d="M 0,342 C 60,338 120,328 180,310 C 240,290 300,265 360,238"
          fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Post-LLM: flattens out -->
    <path d="M 360,238 C 420,278 480,262 540,238 C 600,210 660,178 720,148"
          fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round"/>

    <!-- Gap annotations -->
    <!-- Pre-LLM small gap -->
    <line x1="270" y1="289" x2="270" y2="300" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="270" cy="289" r="2.5" fill="#f59e0b"/>
    <circle cx="270" cy="300" r="2.5" fill="#f59e0b"/>

    <!-- Post-LLM large gap arrow -->
    <line x1="600" y1="33" x2="600" y2="205" stroke="#ef4444" stroke-width="2"/>
    <polygon points="600,33 595,43 605,43" fill="#ef4444"/>
    <polygon points="600,205 595,195 605,195" fill="#ef4444"/>

    <!-- Gap labels -->
    <rect x="215" y="278" width="48" height="18" rx="3" fill="#fffbeb" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="239" y="290" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">small</text>

    <rect x="610" y="105" width="95" height="22" rx="3" fill="#fef2f2" stroke="#ef4444" stroke-width="0.8"/>
    <text x="657" y="119" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">Ed growing</text>

    <!-- "Natural friction" annotation (pre-LLM) -->
    <g transform="translate(100, 330)">
      <rect x="-60" y="-12" width="120" height="20" rx="3" fill="#fffbeb" stroke="#d97706" stroke-width="0.7" opacity="0.9"/>
      <text x="0" y="2" text-anchor="middle" font-size="9" fill="#92400e">friction keeps gap narrow</text>
    </g>

    <!-- "Friction removed" annotation (post-LLM) -->
    <g transform="translate(540, 290)">
      <rect x="-72" y="-12" width="144" height="20" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="0.7" opacity="0.9"/>
      <text x="0" y="2" text-anchor="middle" font-size="9" fill="#991b1b">natural brake removed by LLMs</text>
    </g>

    <!-- Axes -->
    <line x1="0" y1="360" x2="720" y2="360" stroke="#374151" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="360" stroke="#374151" stroke-width="1.5"/>

    <!-- Y-axis label -->
    <text x="-50" y="180" text-anchor="middle" font-size="12" fill="#374151" transform="rotate(-90, -50, 180)">Complexity / Understanding</text>

    <!-- X-axis label -->
    <text x="360" y="390" text-anchor="middle" font-size="12" fill="#374151">Time (t)</text>

    <!-- Axis arrow tips -->
    <polygon points="720,360 712,355 712,365" fill="#374151"/>
    <polygon points="0,0 -5,8 5,8" fill="#374151"/>
  </g>

  <!-- Legend -->
  <g transform="translate(450, 488)">
    <line x1="-200" y1="0" x2="-170" y2="0" stroke="#1e40af" stroke-width="3"/>
    <text x="-165" y="4" font-size="11" fill="#1e293b">Cs(t) System Complexity</text>

    <line x1="10" y1="0" x2="40" y2="0" stroke="#059669" stroke-width="3"/>
    <text x="45" y="4" font-size="11" fill="#1e293b">Gc(t) Cognitive Grasp</text>

    <rect x="180" y="-6" width="14" height="14" rx="2" fill="url(#debtGrad)" stroke="#ef4444" stroke-width="0.5"/>
    <text x="200" y="5" font-size="11" fill="#1e293b">Epistemic Debt (Ed)</text>
  </g>
</svg>